<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body">
        <h2 class="text-center mb-4">Edit Expense</h2>

        <div class="mb-3">
          <label class="form-label"> Expense Title </label>

          <input type="text" class="form-control" [(ngModel)]="title" />
        </div>

        <div class="mb-3">
          <label class="form-label"> Amount </label>

          <div class="input-group">
            <span class="input-group-text"> $ </span>

            <input type="number" class="form-control" [(ngModel)]="amount" />
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label"> Category </label>

          <select class="form-select" [(ngModel)]="category">
            @for (category of expenseService.categories(); track category) {
              <option [value]="category">
                {{ category }}
              </option>
            }
          </select>
        </div>

        <div class="d-grid">
          <button class="btn btn-warning" (click)="updateExpense()">Update Expense</button>
        </div>
      </div>
    </div>
  </div>
</div>
