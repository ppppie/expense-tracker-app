<h1 class="text-center mb-5">Financial Dashboard</h1>

<div class="row g-4">
  <!-- Total Income -->
  <div class="col-md-6 col-lg-3">
    <div class="card shadow-sm border-success h-100">
      <div class="card-body text-center">
        <h5 class="card-title">Total Income</h5>

        <h2 class="text-success">${{ expenseService.totalIncome().toFixed(2) }}</h2>
      </div>
    </div>
  </div>

  <!-- Total Expenses -->
  <div class="col-md-6 col-lg-3">
    <div class="card shadow-sm border-danger h-100">
      <div class="card-body text-center">
        <h5 class="card-title">Total Expenses</h5>

        <h2 class="text-danger">${{ expenseService.totalExpenseAmount().toFixed(2) }}</h2>
      </div>
    </div>
  </div>

  <!-- Current Balance -->
  <div class="col-md-6 col-lg-3">
    <div
      class="card shadow-sm h-100"
      [class.border-success]="expenseService.currentBalance() >= 0"
      [class.border-danger]="expenseService.currentBalance() < 0"
    >
      <div class="card-body text-center">
        <h5 class="card-title">Current Balance</h5>

        <h2
          [class.text-success]="expenseService.currentBalance() >= 0"
          [class.text-danger]="expenseService.currentBalance() < 0"
        >
          ${{ expenseService.currentBalance().toFixed(2) }}
        </h2>
      </div>
    </div>
  </div>

  <!-- Transaction Count -->
  <div class="col-md-6 col-lg-3">
    <div class="card shadow-sm border-primary h-100">
      <div class="card-body text-center">
        <h5 class="card-title">Transactions</h5>

        <h2 class="text-primary">
          {{ expenseService.transactionCount() }}
        </h2>
      </div>
    </div>
  </div>
</div>
