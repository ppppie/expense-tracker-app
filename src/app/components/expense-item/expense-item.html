<div
  class="card shadow-sm h-100"
  [class.border-danger]="expense().amount >= 100"
  [class.border-success]="expense().amount < 100"
>
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-start mb-3">
      <div>
        <h4 class="mb-1">
          {{ expense().title }}
        </h4>

        <span class="badge bg-secondary">
          {{ expense().category }}
        </span>
      </div>

      <h5 class="text-primary">${{ expense().amount.toFixed(2) }}</h5>
    </div>

    <div class="d-flex gap-2">
      <button class="btn btn-warning btn-sm" [routerLink]="['/edit', expense().id]">Edit</button>

      <button class="btn btn-danger btn-sm" (click)="deleteExpense()">Delete</button>
    </div>
  </div>
</div>
