<div
  class="card shadow-sm h-100"
  [class.border-success]="expense().type === 'Income'"
  [class.border-warning]="expense().type === 'Expense' && expense().amount < 100"
  [class.border-danger]="expense().type === 'Expense' && expense().amount >= 100"
>
  <div class="card-body d-flex flex-column">
    <!-- Header -->
    <div class="d-flex justify-content-between align-items-start mb-3">
      <div>
        <h4 class="mb-1">
          {{ expense().title }}
        </h4>

        <div class="d-flex gap-2 flex-wrap">
          <span class="badge category-badge">
            {{ getCategoryEmoji(expense().category) }}
            {{ expense().category }}
          </span>

          <span
            class="badge"
            [class.bg-danger]="expense().type === 'Expense'"
            [class.bg-success]="expense().type === 'Income'"
          >
            {{ expense().type }}
          </span>
        </div>
      </div>

      <h5
        [class.text-danger]="expense().type === 'Expense'"
        [class.text-success]="expense().type === 'Income'"
      >
        ${{ expense().amount.toFixed(2) }}
      </h5>
    </div>

    <!-- Date -->
    <p class="mb-2 text-muted">
      <strong>Date:</strong>
      {{ expense().date }}
    </p>

    <!-- Notes -->
    @if (expense().notes) {
      <p class="mb-3">
        <strong>Notes:</strong>
        {{ expense().notes }}
      </p>
    }

    <!-- Buttons -->
    <div class="d-flex justify-content-end gap-2 mt-auto">
      <button class="btn btn-outline-warning btn-sm" [routerLink]="['/edit', expense().id]">
        Edit
      </button>

      <button class="btn btn-outline-danger btn-sm" (click)="deleteExpense()">Delete</button>
    </div>
  </div>
</div>
