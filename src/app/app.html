<mat-toolbar>
  <div class="logo-box me-4" routerLink="/">
    <div>EXPENSE TRACKER</div>
    <div class="logo-subtitle">by Maddie</div>
  </div>

  <div class="nav-buttons">
    <button
      mat-button
      routerLink="/"
      routerLinkActive="active-nav"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      Dashboard
    </button>

    <button
      mat-button
      routerLink="/add"
      routerLinkActive="active-nav"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      Add Expense
    </button>

    <button
      mat-button
      routerLink="/expenses"
      routerLinkActive="active-nav"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      View Expenses
    </button>
  </div>
</mat-toolbar>

<div class="container mt-4">
  <router-outlet></router-outlet>
</div>
